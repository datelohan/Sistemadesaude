services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smeds_dev}
      MYSQL_USER: ${MYSQL_USER:-smeds}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smeds}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smeds

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
      elasticmq:
        condition: service_started
      mailhog:
        condition: service_started
    networks:
      - smeds

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "5173:5173"
    env_file: .env
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    networks:
      - smeds

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - smeds

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./docker/elasticmq.conf:/opt/elasticmq.conf
    networks:
      - smeds

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - smeds

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - smeds

volumes:
  minio_data:
  mysql_data:

networks:
  smeds:
    driver: bridge
